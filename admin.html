<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Táctica Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Outfit:wght@800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Manrope', sans-serif;
    background: #121212; color: #e0e0e0;
    min-height: 100vh; padding: 32px;
  }
  .header {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 0; padding-bottom: 16px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .header h1 { font-family: 'Outfit', sans-serif; font-size: 22px; font-weight: 800; letter-spacing: 3px; color: #e2e2e2; }
  .header .badge { font-size: 10px; background: rgba(52,211,153,0.15); color: #34D399; padding: 3px 8px; border-radius: 6px; font-weight: 600; letter-spacing: 1px; }
  .loading { text-align: center; padding: 60px; color: #888; font-size: 14px; }
  .auth-gate { text-align: center; padding: 80px 20px; }
  .auth-gate h2 { font-size: 18px; margin-bottom: 16px; color: #34D399; }
  .auth-gate p { color: #888; font-size: 13px; margin-bottom: 24px; }
  .auth-gate button {
    background: #34D399; color: #000; border: none; padding: 10px 24px;
    border-radius: 20px; font-weight: 600; cursor: pointer; font-size: 13px;
    font-family: 'Manrope', sans-serif;
    box-shadow: 0 4px 16px rgba(52,211,153,0.35);
  }

  /* Tabs */
  .admin-tabs {
    display: flex; gap: 2px; padding: 16px 0 24px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    margin-bottom: 24px;
  }
  .admin-tab {
    padding: 8px 20px; border-radius: 8px; border: none;
    font-family: 'Manrope', sans-serif; font-size: 13px; font-weight: 600;
    color: #666; background: transparent; cursor: pointer;
    transition: all 0.15s; letter-spacing: 0.3px;
  }
  .admin-tab:hover { color: #999; }
  .admin-tab.active { background: #34D399; color: #000; border-radius: 20px; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Stats cards */
  .stats-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px; margin-bottom: 16px;
  }
  .stat-card {
    background: #1a1a1a; border-radius: 12px; padding: 20px;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .stat-card .label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: #888; margin-bottom: 8px; }
  .stat-card .value { font-size: 28px; font-weight: 700; color: #e0e0e0; }
  .stat-card .sub { font-size: 11px; color: #666; margin-top: 4px; }

  /* Section */
  .section { margin-bottom: 32px; }
  .section-header {
    font-size: 13px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
    color: #34D399; margin-bottom: 14px; padding-bottom: 8px;
    border-bottom: 1px solid rgba(52,211,153,0.15);
    display: flex; align-items: center; gap: 8px;
  }
  .section-header .icon { font-size: 14px; opacity: 0.7; }
  .section h2 { font-size: 14px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #888; margin-bottom: 12px; }

  /* Table */
  .table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid rgba(255,255,255,0.06); }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { text-align: left; padding: 10px 14px; font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #666; background: #1a1a1a; border-bottom: 1px solid rgba(255,255,255,0.06); }
  td { padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.04); }
  tr:hover td { background: rgba(52,211,153,0.03); }
  .email { color: #34D399; }
  .returning { color: #4ade80; font-weight: 600; }
  .new { color: #888; }

  /* Milestone bar */
  .milestone-card {
    background: #1a1a1a; border-radius: 12px; padding: 20px;
    border: 1px solid rgba(255,255,255,0.06);
    grid-column: 1 / -1;
  }
  .milestone-card .label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: #888; margin-bottom: 12px; }
  .milestone-track {
    position: relative; height: 28px; background: rgba(255,255,255,0.04);
    border-radius: 14px; overflow: visible; margin-bottom: 8px;
  }
  .milestone-fill {
    height: 100%; border-radius: 14px;
    background: linear-gradient(90deg, #34D399, #6EE7B7);
    transition: width 0.6s ease; position: relative;
  }
  .milestone-fill .milestone-count {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    font-size: 13px; font-weight: 700; color: #000;
  }
  .milestone-markers {
    display: flex; position: relative; height: 22px; margin-top: 2px;
  }
  .milestone-marker {
    position: absolute; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center;
  }
  .milestone-marker .tick { width: 1px; height: 8px; background: rgba(255,255,255,0.15); }
  .milestone-marker .m-label { font-size: 9px; color: #555; font-weight: 600; margin-top: 2px; }
  .milestone-marker.reached .m-label { color: #34D399; }
  .milestone-marker.next .m-label { color: #e0e0e0; }

  /* Activity chart */
  .chart-container { background: #1a1a1a; border-radius: 12px; padding: 20px; border: 1px solid rgba(255,255,255,0.06); }
  .chart-bars { display: flex; align-items: flex-end; gap: 4px; height: 120px; margin-top: 12px; }
  .chart-bar { flex: 1; background: #34D399; border-radius: 3px 3px 0 0; min-width: 8px; position: relative; transition: all 0.2s; cursor: default; }
  .chart-bar:hover { opacity: 0.8; }
  .chart-bar .tooltip {
    display: none; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
    background: #333; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 10px;
    white-space: nowrap; margin-bottom: 4px;
  }
  .chart-bar:hover .tooltip { display: block; }
  .chart-labels { display: flex; gap: 4px; margin-top: 6px; }
  .chart-labels span { flex: 1; text-align: center; font-size: 8px; color: #555; }

  .refresh-btn {
    background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #888;
    padding: 6px 14px; border-radius: 6px; font-size: 11px; cursor: pointer;
    font-family: 'Manrope', sans-serif; font-weight: 500; transition: all 0.15s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .refresh-btn:hover { border-color: #34D399; color: #34D399; border-radius: 20px; }
  .refresh-btn.loading { pointer-events: none; opacity: 0.6; }
  .refresh-spinner {
    display: none; width: 12px; height: 12px;
    border: 2px solid rgba(52,211,153,0.2); border-top-color: #34D399;
    border-radius: 50%; animation: spin 0.7s linear infinite;
  }
  .refresh-btn.loading .refresh-spinner { display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Shimmer loading skeleton */
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  .shimmer .stat-card .value,
  .shimmer .stat-card .sub {
    color: transparent !important;
    background: linear-gradient(90deg, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s ease-in-out infinite;
    border-radius: 4px;
    min-width: 40px;
    min-height: 1.2em;
  }
  .shimmer .milestone-bar-fill { animation: shimmer 1.5s ease-in-out infinite; background-size: 200% 100%; }
  .shimmer table tbody { opacity: 0.3; }

  .date-filters { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
  .date-filters label { font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: #666; }
  .date-filters input[type="date"] {
    background: #1a1a1a; border: 1px solid rgba(255,255,255,0.1); color: #e0e0e0;
    padding: 6px 10px; border-radius: 6px; font-size: 12px; font-family: 'Manrope', sans-serif;
    outline: none; cursor: pointer;
  }
  .date-filters input[type="date"]:focus { border-color: #34D399; }
  .date-filters .sep { color: #444; font-size: 12px; }

  /* Feature breakdown cards */
  .feature-card {
    background: #1a1a1a; border-radius: 12px; padding: 20px;
    border: 1px solid rgba(255,255,255,0.06);
    margin-bottom: 20px;
  }
  .feature-card-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px; padding-bottom: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .feature-card-title { font-size: 14px; font-weight: 700; color: #34D399; letter-spacing: 0.5px; }
  .feature-card-summary { font-size: 11px; color: #666; }
  .breakdown-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .breakdown-bar:last-child { border-bottom: none; }
  .breakdown-label { font-size: 12px; color: #ccc; min-width: 140px; }
  .breakdown-track { flex: 1; height: 20px; background: rgba(255,255,255,0.04); border-radius: 4px; overflow: hidden; }
  .breakdown-fill { height: 100%; background: #34D399; border-radius: 4px; min-width: 2px; transition: width 0.3s; }
  .breakdown-count { font-size: 11px; color: #888; min-width: 60px; text-align: right; }
  .breakdown-sessions { font-size: 10px; color: #555; min-width: 80px; text-align: right; }

  /* Pitch analytics pie charts */
  .pitch-analytics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 16px; }
  .pie-card {
    background: #1a1a1a; border-radius: 12px; padding: 16px;
    border: 1px solid rgba(255,255,255,0.06);
    display: flex; flex-direction: column; align-items: center;
  }
  .pie-card h4 { font-size: 12px; font-weight: 700; color: #34D399; margin: 0 0 12px 0; letter-spacing: 0.5px; }
  .pie-legend { margin-top: 10px; width: 100%; }
  .pie-legend-row { display: flex; align-items: center; gap: 6px; padding: 3px 0; font-size: 11px; color: #ccc; }
  .pie-legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .pie-legend-pct { margin-left: auto; color: #888; font-size: 10px; }

  /* Top combos table */
  .combos-card {
    background: #1a1a1a; border-radius: 12px; padding: 16px;
    border: 1px solid rgba(255,255,255,0.06); margin-bottom: 20px;
  }
  .combos-card h4 { font-size: 12px; font-weight: 700; color: #34D399; margin: 0 0 12px 0; letter-spacing: 0.5px; }
  .combos-table { width: 100%; border-collapse: collapse; }
  .combos-table th { text-align: left; font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; padding: 6px 8px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .combos-table td { font-size: 12px; color: #ccc; padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.03); }
  .combos-table tr:last-child td { border-bottom: none; }
  .combos-rank { color: #34D399; font-weight: 700; width: 24px; }

  /* Reviews tab */
  .funnel-visual { display: flex; align-items: stretch; gap: 0; margin-top: 16px; }
  .funnel-step {
    flex: 1; text-align: center; padding: 20px 12px; position: relative;
    border-right: 1px solid rgba(255,255,255,0.06);
  }
  .funnel-step:last-child { border-right: none; }
  .funnel-step .f-value { font-size: 28px; font-weight: 700; color: #e0e0e0; }
  .funnel-step .f-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: #888; margin-top: 4px; }
  .funnel-step .f-rate { font-size: 12px; color: #34D399; font-weight: 600; margin-top: 6px; }
  .funnel-arrow { color: #333; font-size: 18px; display: flex; align-items: center; padding: 0 4px; }
  .funnel-bar-track { height: 6px; background: rgba(255,255,255,0.04); border-radius: 3px; margin-top: 10px; }
  .funnel-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }

  .rating-bar-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; }
  .rating-label { font-size: 13px; color: #ccc; min-width: 36px; text-align: right; }
  .rating-track { flex: 1; height: 22px; background: rgba(255,255,255,0.04); border-radius: 4px; overflow: hidden; }
  .rating-fill { height: 100%; border-radius: 4px; min-width: 2px; transition: width 0.3s; display: flex; align-items: center; padding-left: 8px; }
  .rating-fill span { font-size: 11px; font-weight: 600; color: #000; }
  .rating-count { font-size: 12px; color: #888; min-width: 50px; }

  .review-item {
    background: #1a1a1a; border-radius: 12px; padding: 16px 20px;
    border: 1px solid rgba(255,255,255,0.06); margin-bottom: 10px;
  }
  .review-item-header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .review-item-stars { color: #FBBF24; font-size: 16px; letter-spacing: 2px; }
  .review-item-user { font-size: 12px; color: #34D399; }
  .review-item-date { font-size: 11px; color: #555; margin-left: auto; }
  .review-item-text { font-size: 13px; color: #ccc; line-height: 1.5; font-style: italic; }
  .review-item-text:empty { display: none; }
  .avg-rating-display { display: flex; align-items: center; gap: 8px; }
  .avg-rating-number { font-size: 36px; font-weight: 700; color: #FBBF24; }
  .avg-rating-stars { color: #FBBF24; font-size: 20px; letter-spacing: 2px; }
  .avg-rating-of { font-size: 12px; color: #666; margin-left: 4px; }

</style>
</head>
<body>

<div class="header">
  <h1>TÁCTICA</h1>
  <span class="badge">ADMIN</span>
  <div style="flex:1"></div>
  <button class="refresh-btn" id="refresh-btn" onclick="_usersLoaded=false;loadDashboard()"><span class="refresh-spinner"></span>Refresh</button>
</div>

<div id="auth-gate" class="auth-gate" style="display:none">
  <h2>Admin Access Required</h2>
  <p>Sign in with your admin Google account to view the dashboard.</p>
  <button onclick="doSignIn()">Sign in with Google</button>
</div>

<div id="dashboard" style="display:none">
  <div class="admin-tabs">
    <button class="admin-tab active" onclick="switchAdminTab('overview')">Overview</button>
    <button class="admin-tab" onclick="switchAdminTab('features')">Features</button>
    <button class="admin-tab" onclick="switchAdminTab('reviews')">Reviews</button>
  </div>

  <div class="date-filters">
    <label>From</label>
    <input type="date" id="date-start">
    <span class="sep">&rarr;</span>
    <label>To</label>
    <input type="date" id="date-end">
    <span class="sep" style="margin-left:12px"></span>
    <label style="display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none">
      <input type="checkbox" id="exclude-me" checked onchange="applyDateFilter()" style="accent-color:#34D399;cursor:pointer">
      <span>Exclude me</span>
    </label>
  </div>

  <!-- ═══ OVERVIEW TAB ═══ -->
  <div class="tab-content active" id="tab-overview">
    <div class="section">
      <div class="section-header"><span class="icon">&#128100;</span> Coach-Level Data</div>
      <div class="stats-grid" id="user-stats"></div>
    </div>
    <div class="section">
      <div class="section-header"><span class="icon">&#9889;</span> Session-Level Data</div>
      <div class="stats-grid" id="session-stats"></div>
    </div>
    <div class="section">
      <div class="section-header"><span class="icon">&#128273;</span> Key Features Usage</div>
      <div class="stats-grid" id="feature-stats"></div>
    </div>
    <div class="section">
      <h2 id="chart-title">Sessions</h2>
      <div class="chart-container">
        <div class="chart-bars" id="chart-bars"></div>
        <div class="chart-labels" id="chart-labels"></div>
      </div>
    </div>
    <div class="section">
      <h2 id="users-table-title">All Coaches</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Email</th><th>Name</th><th>First Seen</th><th>Last Seen</th><th>Sessions</th><th>Status</th></tr>
          </thead>
          <tbody id="users-table"></tbody>
        </table>
      </div>
      <button class="refresh-btn" id="users-show-more" style="display:none;margin-top:12px;width:100%" onclick="showMoreUsers()">Show more</button>
    </div>
  </div>

  <!-- ═══ FEATURES TAB ═══ -->
  <div class="tab-content" id="tab-features">
    <div id="features-breakdown"></div>
  </div>

  <!-- ═══ REVIEWS TAB ═══ -->
  <div class="tab-content" id="tab-reviews">
    <div class="section">
      <div class="section-header"><span class="icon">⭐</span> Review Funnel</div>
      <div class="stats-grid" id="review-funnel-stats"></div>
    </div>
    <div class="section">
      <div class="section-header"><span class="icon">📊</span> Rating Distribution</div>
      <div id="review-distribution"></div>
    </div>
    <div class="section">
      <div class="section-header"><span class="icon">💬</span> Reviews</div>
      <div id="review-list"></div>
    </div>
  </div>

</div>

<div id="loading" class="loading">Loading...</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js';
import { getAuth, setPersistence, browserLocalPersistence, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js';
import { getFirestore, collection, query, orderBy, getDocs } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyBda3avj-hYXV72mgbc5ueLw7QAQnqTI34",
  authDomain: "tactica-94ff8.firebaseapp.com",
  projectId: "tactica-94ff8",
  storageBucket: "tactica-94ff8.firebasestorage.app",
  messagingSenderId: "288026105473",
  appId: "1:288026105473:web:50e369ab4be48afe685f80",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
setPersistence(auth, browserLocalPersistence);
const db = getFirestore(app);

const ADMIN_EMAILS = ['juliangenoud@gmail.com'];

window.doSignIn = async function() {
  try { await signInWithPopup(auth, new GoogleAuthProvider()); } catch (e) { alert('Sign in failed: ' + e.message); }
};

onAuthStateChanged(auth, (user) => {
  document.getElementById('loading').style.display = 'none';
  if (user && ADMIN_EMAILS.includes(user.email)) {
    document.getElementById('auth-gate').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadDashboard();
  } else if (user) {
    document.getElementById('auth-gate').style.display = 'block';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('auth-gate').querySelector('p').textContent = 'Access denied. ' + user.email + ' is not an admin.';
  } else {
    document.getElementById('auth-gate').style.display = 'block';
    document.getElementById('dashboard').style.display = 'none';
  }
});

// ─── Tab switching ─────────────────────────────────────────────────────────
window.switchAdminTab = function(tab) {
  document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelector(`.admin-tab[onclick*="${tab}"]`).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
};

// ─── Data cache ────────────────────────────────────────────────────────────
let _allUsers = [];      // always all-time (small collection, needed for milestones)
let _allSessions = [];   // scoped to selected dates
let _allActions = [];    // scoped to selected dates
let _usersLoaded = false;

const today = new Date().toISOString().slice(0, 10);
document.getElementById('date-start').value = today;
document.getElementById('date-end').value = today;

window.loadDashboard = async function() {
  const btn = document.getElementById('refresh-btn');
  const dashboard = document.getElementById('tab-overview');
  if (btn) btn.classList.add('loading');
  if (dashboard) dashboard.classList.add('shimmer');

  const startStr = document.getElementById('date-start').value;
  const endStr = document.getElementById('date-end').value;
  if (!startStr || !endStr) return;
  const startMs = new Date(startStr + 'T00:00:00').getTime();
  const endMs = new Date(endStr + 'T23:59:59.999').getTime();

  try {
    // Fetch all three collections in parallel (no where — avoids index issues, fast enough)
    const [usersSnap, sessionsSnap, actionsSnap] = await Promise.all([
      _usersLoaded ? null : getDocs(query(collection(db, 'tactica_users'), orderBy('lastSeen', 'desc'))),
      getDocs(query(collection(db, 'tactica_sessions'), orderBy('timestamp', 'desc'))),
      getDocs(query(collection(db, 'tactica_actions'), orderBy('timestamp', 'desc'))).catch(e => { console.warn('Actions fetch failed:', e); return null; }),
    ]);

    if (usersSnap) { _allUsers = usersSnap.docs.map(d => ({ uid: d.id, ...d.data() })); _usersLoaded = true; }
    _allSessions = sessionsSnap.docs.map(d => d.data());
    _allActions = actionsSnap ? actionsSnap.docs.map(d => d.data()) : [];

    applyDateFilter();
  } catch (e) { console.error('Dashboard error:', e); }
  finally {
    if (btn) btn.classList.remove('loading');
    if (dashboard) dashboard.classList.remove('shimmer');
  }
};

// Date changes filter in-memory (instant) — re-fetch only on Refresh
document.getElementById('date-start').addEventListener('change', () => applyDateFilter());
document.getElementById('date-end').addEventListener('change', () => applyDateFilter());

window.applyDateFilter = function() {
  const startStr = document.getElementById('date-start').value;
  const endStr = document.getElementById('date-end').value;
  if (!startStr || !endStr) return;

  const startMs = new Date(startStr + 'T00:00:00').getTime();
  const endMs = new Date(endStr + 'T23:59:59.999').getTime();

  const excludeMe = document.getElementById('exclude-me').checked;
  const excludeUids = excludeMe ? new Set(_allUsers.filter(u => ADMIN_EMAILS.includes(u.email)).map(u => u.uid)) : new Set();

  const filteredSessions = _allSessions.filter(s => s.timestamp >= startMs && s.timestamp <= endMs && !excludeUids.has(s.uid));
  const filteredActions = _allActions.filter(a => a.timestamp >= startMs && a.timestamp <= endMs && !excludeUids.has(a.uid));
  const activeUids = new Set(filteredSessions.map(s => s.uid));
  const filteredUsers = _allUsers.filter(u => activeUids.has(u.uid) && !excludeUids.has(u.uid));

  const allUsersFiltered = excludeMe ? _allUsers.filter(u => !excludeUids.has(u.uid)) : _allUsers;
  const signUps = allUsersFiltered.filter(u => u.firstSeen >= startMs && u.firstSeen <= endMs).length;

  renderUserStats(filteredUsers, filteredSessions, allUsersFiltered, filteredActions, activeUids, signUps);
  renderSessionStats(filteredSessions, filteredActions);
  renderFeatureStats(filteredActions, activeUids.size);
  renderChart(filteredSessions, startStr, endStr);
  renderUsersTable(filteredUsers);
  renderFeaturesTab(filteredActions, activeUids.size);
  renderReviewsTab(filteredActions);
};

// ─── User-Level Stats ───────────────────────────────────────────────────────
function renderUserStats(users, sessions, allUsers, actions, activeUids, signUps) {
  const totalCoaches = allUsers.length;
  const activeCoaches = activeUids.size;
  const returningCoaches = users.filter(u => u.sessionCount > 1).length;
  const analysisCoaches = new Set((actions || []).filter(a => a.action === 'analysis_started').map(a => a.uid)).size;
  const boardAnalysisCoaches = new Set((actions || []).filter(a => a.action === 'analysis_started' && (!a.meta || !a.meta.mode || a.meta.mode === 'pitch')).map(a => a.uid)).size;
  const imageAnalysisCoaches = new Set((actions || []).filter(a => a.action === 'analysis_started' && a.meta && a.meta.mode === 'image').map(a => a.uid)).size;
  const exportOrSaveCoaches = new Set((actions || []).filter(a => a.action === 'save' || a.action === 'export' || a.action === 'share_created' || (a.action === 'feature_animation' && a.meta && (a.meta.trigger === 'export_gif' || a.meta.trigger === 'export' || a.meta.trigger === 'export_video'))).map(a => a.uid)).size;
  const pct = (n) => activeCoaches > 0 ? Math.round(n / activeCoaches * 100) : 0;

  // Milestone bar
  const milestones = [100, 200, 500, 1000];
  const nextM = milestones.find(m => totalCoaches < m) || milestones[milestones.length - 1];
  const prevM = milestones[milestones.indexOf(nextM) - 1] || 0;
  const barPct = Math.min(100, Math.round(((totalCoaches - prevM) / (nextM - prevM)) * 100));
  const overallPct = Math.min(100, Math.round((totalCoaches / milestones[milestones.length - 1]) * 100));
  const milestoneHTML = `<div class="milestone-card">
    <div class="label">Total Coaches &mdash; Road to 1,000 &middot; Next Milestone: ${nextM}</div>
    <div class="milestone-track">
      <div class="milestone-fill" style="width:${overallPct}%">
        <span class="milestone-count">${totalCoaches}</span>
      </div>
    </div>
    <div class="milestone-markers">
      ${milestones.map(m => {
        const pos = Math.round((m / milestones[milestones.length - 1]) * 100);
        const reached = totalCoaches >= m;
        const isNext = m === nextM && !reached;
        return `<div class="milestone-marker${reached ? ' reached' : ''}${isNext ? ' next' : ''}" style="left:${pos}%">
          <div class="tick"></div>
          <span class="m-label">${m >= 1000 ? (m/1000)+'K' : m}</span>
        </div>`;
      }).join('')}
    </div>
  </div>`;

  document.getElementById('user-stats').innerHTML = milestoneHTML + `
    <div class="stat-card"><div class="label">Sign Ups in Period</div><div class="value">${signUps}</div></div>
    <div class="stat-card"><div class="label">Active Coaches in Period</div><div class="value">${activeCoaches}</div></div>
    <div class="stat-card"><div class="label">Returning Coaches</div><div class="value">${returningCoaches}</div><div class="sub">${pct(returningCoaches)}% of active</div></div>
    <div class="stat-card"><div class="label">Coaches w/ an Analysis</div><div class="value">${pct(analysisCoaches)}%</div><div class="sub">${analysisCoaches} of ${activeCoaches} active</div></div>
    <div class="stat-card"><div class="label">Board Analysis</div><div class="value">${boardAnalysisCoaches}</div><div class="sub">${pct(boardAnalysisCoaches)}% of active coaches</div></div>
    <div class="stat-card"><div class="label">Image Analysis</div><div class="value">${imageAnalysisCoaches}</div><div class="sub">${pct(imageAnalysisCoaches)}% of active coaches</div></div>
    <div class="stat-card"><div class="label">Coaches w/ Export, Save or Share</div><div class="value">${pct(exportOrSaveCoaches)}%</div><div class="sub">${exportOrSaveCoaches} of ${activeCoaches} active</div></div>
  `;
}

function buildPieSVG(slices, size = 80) {
  const r = size / 2, cx = r, cy = r;
  let startAngle = -Math.PI / 2;
  const total = slices.reduce((s, sl) => s + sl.value, 0);
  if (total === 0) return `<svg width="${size}" height="${size}"><circle cx="${cx}" cy="${cy}" r="${r-1}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/></svg>`;
  let paths = '';
  slices.forEach(sl => {
    const pct = sl.value / total;
    const angle = pct * Math.PI * 2;
    const endAngle = startAngle + angle;
    const largeArc = angle > Math.PI ? 1 : 0;
    const x1 = cx + (r - 1) * Math.cos(startAngle), y1 = cy + (r - 1) * Math.sin(startAngle);
    const x2 = cx + (r - 1) * Math.cos(endAngle), y2 = cy + (r - 1) * Math.sin(endAngle);
    if (pct >= 0.999) {
      paths += `<circle cx="${cx}" cy="${cy}" r="${r-1}" fill="${sl.color}"/>`;
    } else if (pct > 0) {
      paths += `<path d="M${cx},${cy} L${x1},${y1} A${r-1},${r-1} 0 ${largeArc},1 ${x2},${y2} Z" fill="${sl.color}"/>`;
    }
    startAngle = endAngle;
  });
  return `<svg width="${size}" height="${size}">${paths}</svg>`;
}

function renderPitchAnalytics(items, isSnapshot) {
  const total = items.length;
  if (total === 0) return '';

  let full, half, horiz, vert, goals, noGoals, gridBoth, gridH, gridV, noGrid, types;

  if (isSnapshot) {
    // Snapshot data has pre-parsed fields
    full = items.filter(a => a.meta.size === 'full').length;
    half = items.filter(a => a.meta.size === 'half').length;
    vert = items.filter(a => a.meta.orientation === 'vertical').length;
    horiz = items.filter(a => a.meta.orientation === 'horizontal').length;
    goals = items.filter(a => a.meta.goals === true).length;
    noGoals = items.filter(a => a.meta.goals === false).length;
    gridBoth = items.filter(a => a.meta.gridH && a.meta.gridV).length;
    gridH = items.filter(a => a.meta.gridH && !a.meta.gridV).length;
    gridV = items.filter(a => !a.meta.gridH && a.meta.gridV).length;
    noGrid = items.filter(a => !a.meta.gridH && !a.meta.gridV).length;
    types = items.map(a => a.meta.layout);
  } else {
    // Fallback: parse from layout strings in feature_pitch_change events
    const pitchItems = items.filter(a => a.action === 'feature_pitch_change' && a.meta && a.meta.type);
    types = pitchItems.map(a => a.meta.type);
    const t2 = types.length;
    if (t2 === 0) return '';
    full = types.filter(t => t.startsWith('full')).length;
    half = t2 - full;
    vert = types.filter(t => (/full-v|half-v/).test(t)).length;
    horiz = t2 - vert;
    noGoals = types.filter(t => t.includes('-ng')).length;
    goals = t2 - noGoals;
    gridBoth = types.filter(t => t.includes('-grid') && !t.includes('-gridh') && !t.includes('-gridv')).length;
    gridH = types.filter(t => t.includes('-gridh')).length;
    gridV = types.filter(t => t.includes('-gridv')).length;
    noGrid = t2 - gridBoth - gridH - gridV;
  }

  const colors = { a: '#34D399', b: '#4A90D9', c: '#5BBD72', d: '#E87461', muted: 'rgba(255,255,255,0.08)' };

  const sourceLabel = isSnapshot ? 'Actual usage' : 'Click data (legacy)';
  let html = `<div style="font-size:10px;color:#555;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px">Pitch Analytics &middot; ${total} sessions &middot; ${sourceLabel}</div>`;
  html += '<div class="pitch-analytics">';

  // Pie 1: Orientation
  html += `<div class="pie-card"><h4>Orientation</h4>`;
  html += buildPieSVG([{ value: horiz, color: colors.a }, { value: vert, color: colors.b }]);
  html += `<div class="pie-legend">
    <div class="pie-legend-row"><span class="pie-legend-dot" style="background:${colors.a}"></span>Horizontal<span class="pie-legend-pct">${total ? Math.round(horiz/total*100) : 0}%</span></div>
    <div class="pie-legend-row"><span class="pie-legend-dot" style="background:${colors.b}"></span>Vertical<span class="pie-legend-pct">${total ? Math.round(vert/total*100) : 0}%</span></div>
  </div></div>`;

  // Pie 2: Size (Full vs Half)
  html += `<div class="pie-card"><h4>Size</h4>`;
  html += buildPieSVG([{ value: full, color: colors.a }, { value: half, color: colors.b }]);
  html += `<div class="pie-legend">
    <div class="pie-legend-row"><span class="pie-legend-dot" style="background:${colors.a}"></span>Full<span class="pie-legend-pct">${total ? Math.round(full/total*100) : 0}%</span></div>
    <div class="pie-legend-row"><span class="pie-legend-dot" style="background:${colors.b}"></span>Half<span class="pie-legend-pct">${total ? Math.round(half/total*100) : 0}%</span></div>
  </div></div>`;

  // Pie 3: Goals vs No Goals
  html += `<div class="pie-card"><h4>Goals</h4>`;
  html += buildPieSVG([{ value: goals, color: colors.c }, { value: noGoals, color: colors.d }]);
  html += `<div class="pie-legend">
    <div class="pie-legend-row"><span class="pie-legend-dot" style="background:${colors.c}"></span>With goals<span class="pie-legend-pct">${total ? Math.round(goals/total*100) : 0}%</span></div>
    <div class="pie-legend-row"><span class="pie-legend-dot" style="background:${colors.d}"></span>No goals<span class="pie-legend-pct">${total ? Math.round(noGoals/total*100) : 0}%</span></div>
  </div></div>`;

  // Pie 3: Grids
  html += `<div class="pie-card"><h4>Grids</h4>`;
  html += buildPieSVG([
    { value: noGrid, color: colors.muted },
    { value: gridBoth, color: colors.a },
    { value: gridH, color: colors.b },
    { value: gridV, color: colors.c },
  ]);
  html += `<div class="pie-legend">
    <div class="pie-legend-row"><span class="pie-legend-dot" style="background:${colors.muted};border:1px solid rgba(255,255,255,0.15)"></span>No grid<span class="pie-legend-pct">${total ? Math.round(noGrid/total*100) : 0}%</span></div>
    <div class="pie-legend-row"><span class="pie-legend-dot" style="background:${colors.a}"></span>Both<span class="pie-legend-pct">${total ? Math.round(gridBoth/total*100) : 0}%</span></div>
    <div class="pie-legend-row"><span class="pie-legend-dot" style="background:${colors.b}"></span>H only<span class="pie-legend-pct">${total ? Math.round(gridH/total*100) : 0}%</span></div>
    <div class="pie-legend-row"><span class="pie-legend-dot" style="background:${colors.c}"></span>V only<span class="pie-legend-pct">${total ? Math.round(gridV/total*100) : 0}%</span></div>
  </div></div>`;

  html += '</div>';

  // Pie 4 replacement: Size (Full vs Half) as a 4th inline card? No — user asked for table.
  // Top 5 combinations table
  const comboCounts = {};
  types.forEach(t => { comboCounts[t] = (comboCounts[t] || 0) + 1; });
  const top5 = Object.entries(comboCounts).sort((a, b) => b[1] - a[1]).slice(0, 5);

  // Human-readable labels
  function describeLayout(lay) {
    const isV = (/full-v|half-v/).test(lay);
    const parts = [];
    parts.push(lay.startsWith('half') ? 'Half' : 'Full');
    parts.push(isV ? 'Vertical' : 'Horizontal');
    if (lay.includes('-ng')) parts.push('No goals');
    if (lay.includes('-grid') && !lay.includes('-gridh') && !lay.includes('-gridv')) parts.push('Both grids');
    else if (lay.includes('-gridh')) parts.push('H grid');
    else if (lay.includes('-gridv')) parts.push('V grid');
    if (lay.includes('-nd')) parts.push('No D arc');
    return parts.join(' · ');
  }

  html += `<div class="combos-card"><h4>Top 5 Pitch Combinations</h4>
    <table class="combos-table">
      <tr><th>#</th><th>Layout</th><th>Description</th><th style="text-align:right">Events</th><th style="text-align:right">%</th></tr>
      ${top5.map(([lay, count], i) => `<tr>
        <td class="combos-rank">${i + 1}</td>
        <td><code style="font-size:11px;color:#aaa">${lay}</code></td>
        <td>${describeLayout(lay)}</td>
        <td style="text-align:right">${count}</td>
        <td style="text-align:right;color:#888">${Math.round(count/total*100)}%</td>
      </tr>`).join('')}
    </table>
  </div>`;

  return html;
}


function renderFeaturesTab(actions, activeUsers) {
  let html = '';

  // Pitch analytics section — prefer snapshot data (actual usage), fall back to click data
  const snapshots = (actions || []).filter(a => a.action === 'pitch_state_snapshot' && a.meta);
  html += renderPitchAnalytics(snapshots.length > 0 ? snapshots : actions, snapshots.length > 0);

  FEATURE_CONFIGS.forEach(cfg => {
    if (cfg.isGroup) {
      // Render group header
      const allGroupItems = cfg.children.flatMap(child => {
        let items = (actions || []).filter(a => a.action === child.action);
        if (child.filterFn) items = items.filter(child.filterFn);
        return items;
      });
      const groupTotal = allGroupItems.length;
      const groupSessions = new Set(allGroupItems.map(a => a.sessionId).filter(Boolean)).size;
      const groupUsers = new Set(allGroupItems.map(a => a.uid)).size;

      html += `<div class="feature-card" style="border-color:rgba(52,211,153,0.3);">
        <div class="feature-card-header">
          <span class="feature-card-title" style="color:#34D399">${cfg.label}</span>
          <span class="feature-card-summary">${groupSessions} sessions &middot; ${groupUsers} coaches &middot; ${groupTotal} events</span>
        </div>`;

      // Render each child as a sub-row with bar
      const maxCount = Math.max(...cfg.children.map(child => {
        let items = (actions || []).filter(a => a.action === child.action);
        if (child.filterFn) items = items.filter(child.filterFn);
        return items.length;
      }), 1);

      // Sort children by event count descending
      const sortedChildren = [...cfg.children].sort((a, b) => {
        let aItems = (actions || []).filter(x => x.action === a.action);
        if (a.filterFn) aItems = aItems.filter(a.filterFn);
        let bItems = (actions || []).filter(x => x.action === b.action);
        if (b.filterFn) bItems = bItems.filter(b.filterFn);
        return bItems.length - aItems.length;
      });

      sortedChildren.forEach(child => {
        let items = (actions || []).filter(a => a.action === child.action);
        if (child.filterFn) items = items.filter(child.filterFn);
        const count = items.length;
        const sessions = new Set(items.map(a => a.sessionId).filter(Boolean)).size;
        const users = new Set(items.map(a => a.uid)).size;
        const pctBar = Math.round((count / maxCount) * 100);
        html += `<div class="breakdown-bar">
          <span class="breakdown-label">${child.label}</span>
          <div class="breakdown-track"><div class="breakdown-fill" style="width:${pctBar}%"></div></div>
          <span class="breakdown-count">${count} events</span>
          <span class="breakdown-sessions">${sessions} sessions</span>
          <span class="breakdown-sessions">${users} coaches</span>
        </div>`;
      });

      html += `</div>`;
      return;
    }

    let items = (actions || []).filter(a => a.action === cfg.action);
    if (cfg.filterFn) items = items.filter(cfg.filterFn);
    // Merge legacy events (e.g. old feature_pitch_change with color → new feature_pitch_color)
    if (cfg.legacyAction) {
      const legacy = (actions || []).filter(a => a.action === cfg.legacyAction);
      const legacyFiltered = cfg.legacyFilterFn ? legacy.filter(cfg.legacyFilterFn) : legacy;
      items = items.concat(legacyFiltered);
    }

    const totalEvents = items.length;
    const uniqueSessions = new Set(items.map(a => a.sessionId).filter(Boolean)).size;
    const uniqueUsers = new Set(items.map(a => a.uid)).size;

    html += `<div class="feature-card">
      <div class="feature-card-header">
        <span class="feature-card-title">${cfg.label}</span>
        <span class="feature-card-summary">${uniqueSessions} sessions &middot; ${uniqueUsers} coaches &middot; ${totalEvents} events</span>
      </div>`;

    if (cfg.metaKey) {
      // Build breakdown by meta value
      const counts = {};
      const sessionSets = {};
      const userSets = {};
      items.forEach(a => {
        const v = a.meta && a.meta[cfg.metaKey];
        if (!v) return;
        counts[v] = (counts[v] || 0) + 1;
        if (!sessionSets[v]) sessionSets[v] = new Set();
        if (!userSets[v]) userSets[v] = new Set();
        if (a.sessionId) sessionSets[v].add(a.sessionId);
        userSets[v].add(a.uid);
      });

      // Normalize legacy meta values: "link" → "connect"
      if (counts['link']) {
        counts['connect'] = (counts['connect'] || 0) + counts['link'];
        if (!sessionSets['connect']) sessionSets['connect'] = new Set();
        if (sessionSets['link']) sessionSets['link'].forEach(s => sessionSets['connect'].add(s));
        if (!userSets['connect']) userSets['connect'] = new Set();
        if (userSets['link']) userSets['link'].forEach(u => userSets['connect'].add(u));
        delete counts['link'];
        delete sessionSets['link'];
        delete userSets['link'];
      }

      // Apply custom normalization (e.g. bucket unknown colors into "Custom")
      if (cfg.normalizeFn) cfg.normalizeFn(counts, sessionSets, userSets);

      const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
      const maxCount = sorted.length > 0 ? sorted[0][1] : 1;

      if (sorted.length === 0) {
        html += `<div style="color:#555;font-size:12px;padding:8px 0">No data yet</div>`;
      } else {
        sorted.forEach(([name, count]) => {
          const pctBar = Math.round((count / maxCount) * 100);
          const sessions = sessionSets[name] ? sessionSets[name].size : 0;
          const users = userSets[name] ? userSets[name].size : 0;
          html += `<div class="breakdown-bar">
            <span class="breakdown-label">${name}</span>
            <div class="breakdown-track"><div class="breakdown-fill" style="width:${pctBar}%"></div></div>
            <span class="breakdown-count">${count} events</span>
            <span class="breakdown-sessions">${sessions} sessions</span>
            <span class="breakdown-sessions">${users} coaches</span>
          </div>`;
        });
      }
    } else {
      html += `<div style="color:#555;font-size:12px;padding:8px 0">No type breakdown &mdash; binary feature (used/not used)</div>`;
    }

    html += `</div>`;
  });

  // Zone Analytics section
  html += renderZoneAnalytics(actions);

  document.getElementById('features-breakdown').innerHTML = html;
}

// ─── Zone Analytics ─────────────────────────────────────────────────────────
function renderZoneAnalytics(actions) {
  let html = '';

  // 1. General usage — zone elements inserted (shadow-rect + shadow-circle)
  const zoneInserts = (actions || []).filter(a =>
    a.action === 'element_inserted' && a.meta &&
    (a.meta.element === 'shadow-rect' || a.meta.element === 'shadow-circle')
  );
  const totalInserts = zoneInserts.length;
  const insertSessions = new Set(zoneInserts.map(a => a.sessionId).filter(Boolean)).size;
  const insertUsers = new Set(zoneInserts.map(a => a.uid)).size;

  html += `<div class="feature-card" style="border-color:rgba(216,255,60,0.3);margin-top:24px;">
    <div class="feature-card-header">
      <span class="feature-card-title" style="color:#D8FF3C">🟡 Zone Analytics</span>
      <span class="feature-card-summary">${insertSessions} sessions &middot; ${insertUsers} coaches &middot; ${totalInserts} zones inserted</span>
    </div>`;

  // 2. Shape breakdown (rect vs circle vs freeform)
  html += `<div style="margin-top:12px;margin-bottom:4px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#888;">Shape Breakdown</div>`;
  const shapeCounts = {};
  const shapeSessionSets = {};
  const shapeUserSets = {};
  zoneInserts.forEach(a => {
    const shape = a.meta.element === 'shadow-rect' ? 'Rectangle' : 'Ellipse';
    shapeCounts[shape] = (shapeCounts[shape] || 0) + 1;
    if (!shapeSessionSets[shape]) shapeSessionSets[shape] = new Set();
    if (!shapeUserSets[shape]) shapeUserSets[shape] = new Set();
    if (a.sessionId) shapeSessionSets[shape].add(a.sessionId);
    shapeUserSets[shape].add(a.uid);
  });
  // Also count shape changes (zone_shape events)
  const shapeChanges = (actions || []).filter(a => a.action === 'zone_shape' && a.meta);
  shapeChanges.forEach(a => {
    const name = a.meta.shape === 'shadow-rect' ? 'Changed → Rectangle'
      : a.meta.shape === 'shadow-circle' ? 'Changed → Ellipse'
      : a.meta.shape === 'freeform' ? 'Changed → Freeform' : a.meta.shape;
    shapeCounts[name] = (shapeCounts[name] || 0) + 1;
    if (!shapeSessionSets[name]) shapeSessionSets[name] = new Set();
    if (!shapeUserSets[name]) shapeUserSets[name] = new Set();
    if (a.sessionId) shapeSessionSets[name].add(a.sessionId);
    shapeUserSets[name].add(a.uid);
  });

  const shapeSorted = Object.entries(shapeCounts).sort((a, b) => b[1] - a[1]);
  const shapeMax = shapeSorted.length > 0 ? shapeSorted[0][1] : 1;
  if (shapeSorted.length === 0) {
    html += `<div style="color:#555;font-size:12px;padding:8px 0">No data yet</div>`;
  } else {
    shapeSorted.forEach(([name, count]) => {
      const pct = Math.round((count / shapeMax) * 100);
      const sessions = shapeSessionSets[name] ? shapeSessionSets[name].size : 0;
      const users = shapeUserSets[name] ? shapeUserSets[name].size : 0;
      html += `<div class="breakdown-bar">
        <span class="breakdown-label">${name}</span>
        <div class="breakdown-track"><div class="breakdown-fill" style="width:${pct}%;background:#D8FF3C"></div></div>
        <span class="breakdown-count">${count}</span>
        <span class="breakdown-sessions">${sessions} sessions</span>
        <span class="breakdown-sessions">${users} coaches</span>
      </div>`;
    });
  }

  // 3. Purpose breakdown
  html += `<div style="margin-top:16px;margin-bottom:4px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#888;">Purpose Breakdown</div>`;
  const purposeEvents = (actions || []).filter(a => a.action === 'zone_purpose' && a.meta && a.meta.purpose);
  const purposeCounts = {};
  const purposeSessionSets = {};
  const purposeUserSets = {};
  purposeEvents.forEach(a => {
    const p = a.meta.purpose;
    const label = p.charAt(0).toUpperCase() + p.slice(1);
    purposeCounts[label] = (purposeCounts[label] || 0) + 1;
    if (!purposeSessionSets[label]) purposeSessionSets[label] = new Set();
    if (!purposeUserSets[label]) purposeUserSets[label] = new Set();
    if (a.sessionId) purposeSessionSets[label].add(a.sessionId);
    purposeUserSets[label].add(a.uid);
  });

  const purposeSorted = Object.entries(purposeCounts).sort((a, b) => b[1] - a[1]);
  const purposeMax = purposeSorted.length > 0 ? purposeSorted[0][1] : 1;
  if (purposeSorted.length === 0) {
    html += `<div style="color:#555;font-size:12px;padding:8px 0">No data yet — tracking starts now</div>`;
  } else {
    purposeSorted.forEach(([name, count]) => {
      const pct = Math.round((count / purposeMax) * 100);
      const sessions = purposeSessionSets[name] ? purposeSessionSets[name].size : 0;
      const users = purposeUserSets[name] ? purposeUserSets[name].size : 0;
      html += `<div class="breakdown-bar">
        <span class="breakdown-label">${name}</span>
        <div class="breakdown-track"><div class="breakdown-fill" style="width:${pct}%;background:#D8FF3C"></div></div>
        <span class="breakdown-count">${count}</span>
        <span class="breakdown-sessions">${sessions} sessions</span>
        <span class="breakdown-sessions">${users} coaches</span>
      </div>`;
    });
  }

  // 4. Label usage — with text vs empty
  html += `<div style="margin-top:16px;margin-bottom:4px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#888;">Label Usage</div>`;
  const labelEvents = (actions || []).filter(a => a.action === 'zone_label' && a.meta);
  const withText = labelEvents.filter(a => a.meta.has_text === true).length;
  const noText = labelEvents.filter(a => a.meta.has_text === false).length;
  const labelTotal = withText + noText;
  if (labelTotal === 0) {
    html += `<div style="color:#555;font-size:12px;padding:8px 0">No data yet — tracking starts now</div>`;
  } else {
    const labelMax = Math.max(withText, noText, 1);
    [['With label text', withText], ['Empty (no text)', noText]].forEach(([name, count]) => {
      const pct = Math.round((count / labelMax) * 100);
      html += `<div class="breakdown-bar">
        <span class="breakdown-label">${name}</span>
        <div class="breakdown-track"><div class="breakdown-fill" style="width:${pct}%;background:#D8FF3C"></div></div>
        <span class="breakdown-count">${count}</span>
        <span class="breakdown-sessions">${Math.round(count / labelTotal * 100)}%</span>
      </div>`;
    });
  }

  html += `</div>`;
  return html;
}

// ─── Reviews Tab ────────────────────────────────────────────────────────────
function renderReviewsTab(actions) {
  const shown = (actions || []).filter(a => a.action === 'review_modal_shown');
  const submitted = (actions || []).filter(a => a.action === 'review_submitted');
  const closed = (actions || []).filter(a => a.action === 'review_modal_closed');

  const shownCount = shown.length;
  const submittedCount = submitted.length;
  const closedCount = closed.length;
  const skippedCount = closed.filter(a => a.meta && a.meta.method === 'skip').length;
  const dismissedCount = closed.filter(a => a.meta && a.meta.method === 'close').length;

  // Average rating
  const ratings = submitted.filter(a => a.meta && a.meta.rating).map(a => a.meta.rating);
  const avgRating = ratings.length > 0 ? (ratings.reduce((s, r) => s + r, 0) / ratings.length) : 0;
  const fullStars = Math.floor(avgRating);
  const halfStar = (avgRating - fullStars) >= 0.5;
  const starsHTML = '★'.repeat(fullStars) + (halfStar ? '½' : '') + '<span style="color:#555">' + '★'.repeat(5 - fullStars - (halfStar ? 1 : 0)) + '</span>';

  const convRate = shownCount > 0 ? Math.round((submittedCount / shownCount) * 100) : 0;
  const dropRate = shownCount > 0 ? Math.round((closedCount / shownCount) * 100) : 0;

  // Funnel stats
  let funnelHTML = `
    <div class="stat-card">
      <div class="label">Average Rating</div>
      <div class="avg-rating-display">
        <span class="avg-rating-number">${avgRating > 0 ? avgRating.toFixed(1) : '—'}</span>
        <span class="avg-rating-stars">${avgRating > 0 ? starsHTML : ''}</span>
        <span class="avg-rating-of">/5</span>
      </div>
      <div class="sub">${ratings.length} review${ratings.length !== 1 ? 's' : ''} with rating</div>
    </div>
    <div class="stat-card"><div class="label">Reviews Submitted</div><div class="value">${submittedCount}</div><div class="sub">${ratings.filter(r => r >= 4).length} positive (4-5★)</div></div>
    <div class="stat-card"><div class="label">With Written Review</div><div class="value">${submitted.filter(a => a.meta && a.meta.has_text).length}</div><div class="sub">${submittedCount > 0 ? Math.round(submitted.filter(a => a.meta && a.meta.has_text).length / submittedCount * 100) : 0}% of submitted</div></div>
  `;

  // Funnel visual
  funnelHTML += `<div class="stat-card" style="grid-column: 1 / -1;">
    <div class="label">Review Funnel</div>
    <div class="funnel-visual">
      <div class="funnel-step">
        <div class="f-value">${shownCount}</div>
        <div class="f-label">Modal Shown</div>
        <div class="funnel-bar-track"><div class="funnel-bar-fill" style="width:100%;background:#34D399"></div></div>
      </div>
      <div class="funnel-arrow">→</div>
      <div class="funnel-step">
        <div class="f-value">${submittedCount}</div>
        <div class="f-label">Submitted</div>
        <div class="f-rate">${convRate}% conversion</div>
        <div class="funnel-bar-track"><div class="funnel-bar-fill" style="width:${shownCount > 0 ? Math.round(submittedCount / shownCount * 100) : 0}%;background:#34D399"></div></div>
      </div>
      <div class="funnel-arrow">|</div>
      <div class="funnel-step">
        <div class="f-value">${skippedCount}</div>
        <div class="f-label">Skipped</div>
        <div class="f-rate">${shownCount > 0 ? Math.round(skippedCount / shownCount * 100) : 0}%</div>
        <div class="funnel-bar-track"><div class="funnel-bar-fill" style="width:${shownCount > 0 ? Math.round(skippedCount / shownCount * 100) : 0}%;background:#666"></div></div>
      </div>
      <div class="funnel-arrow">|</div>
      <div class="funnel-step">
        <div class="f-value">${dismissedCount}</div>
        <div class="f-label">Dismissed (✕)</div>
        <div class="f-rate">${shownCount > 0 ? Math.round(dismissedCount / shownCount * 100) : 0}%</div>
        <div class="funnel-bar-track"><div class="funnel-bar-fill" style="width:${shownCount > 0 ? Math.round(dismissedCount / shownCount * 100) : 0}%;background:#555"></div></div>
      </div>
    </div>
  </div>`;

  document.getElementById('review-funnel-stats').innerHTML = funnelHTML;

  // Rating distribution (5 → 1)
  const ratingCounts = [0, 0, 0, 0, 0]; // index 0 = 1★, index 4 = 5★
  ratings.forEach(r => { if (r >= 1 && r <= 5) ratingCounts[r - 1]++; });
  const maxRatingCount = Math.max(1, ...ratingCounts);
  const ratingColors = ['#F87171', '#FB923C', '#FBBF24', '#A3E635', '#34D399'];

  let distHTML = '<div class="feature-card">';
  for (let i = 4; i >= 0; i--) {
    const pctBar = Math.round((ratingCounts[i] / maxRatingCount) * 100);
    const pctTotal = ratings.length > 0 ? Math.round((ratingCounts[i] / ratings.length) * 100) : 0;
    distHTML += `<div class="rating-bar-row">
      <span class="rating-label">${i + 1} ★</span>
      <div class="rating-track"><div class="rating-fill" style="width:${pctBar}%;background:${ratingColors[i]}"><span>${ratingCounts[i] > 0 ? ratingCounts[i] : ''}</span></div></div>
      <span class="rating-count">${pctTotal}%</span>
    </div>`;
  }
  distHTML += '</div>';
  document.getElementById('review-distribution').innerHTML = distHTML;

  // Individual reviews (newest first)
  const reviewItems = submitted
    .filter(a => a.meta)
    .sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

  if (reviewItems.length === 0) {
    document.getElementById('review-list').innerHTML = '<div style="color:#555;font-size:13px;padding:16px 0">No reviews yet in this period</div>';
    return;
  }

  let listHTML = '';
  reviewItems.forEach(a => {
    const rating = a.meta.rating || 0;
    const stars = '★'.repeat(rating) + '<span style="color:#555">' + '★'.repeat(5 - rating) + '</span>';
    const date = a.timestamp ? new Date(a.timestamp).toLocaleDateString('en', { month: 'short', day: 'numeric', year: 'numeric' }) : '';
    const text = a.meta.text || '';
    listHTML += `<div class="review-item">
      <div class="review-item-header">
        <span class="review-item-stars">${stars}</span>
        <span class="review-item-user">${a.email || 'anonymous'}</span>
        <span class="review-item-date">${date}</span>
      </div>
      ${text ? `<div class="review-item-text">"${text}"</div>` : '<div style="font-size:11px;color:#555;font-style:italic">No written review</div>'}
    </div>`;
  });

  document.getElementById('review-list').innerHTML = listHTML;
}

// ─── Chart ──────────────────────────────────────────────────────────────────
function localDateStr(d) {
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function renderChart(sessions, startStr, endStr) {
  const start = new Date(startStr + 'T00:00:00');
  const end = new Date(endStr + 'T00:00:00');
  const diffDays = Math.round((end - start) / 86400000) + 1;

  const title = document.getElementById('chart-title');
  if (startStr === endStr) {
    title.textContent = 'Sessions \u00b7 ' + new Date(startStr + 'T12:00:00').toLocaleDateString('en', { month: 'short', day: 'numeric', year: 'numeric' });
  } else {
    title.textContent = 'Sessions \u00b7 ' + diffDays + ' days';
  }

  const buckets = {};
  for (let i = 0; i < diffDays; i++) {
    const d = new Date(start); d.setDate(d.getDate() + i);
    buckets[localDateStr(d)] = { count: 0, uniqueUsers: new Set() };
  }
  sessions.forEach(s => {
    const key = localDateStr(new Date(s.timestamp));
    if (buckets[key]) { buckets[key].count++; buckets[key].uniqueUsers.add(s.uid); }
  });

  const keys = Object.keys(buckets);
  const maxCount = Math.max(1, ...keys.map(k => buckets[k].count));
  const barsEl = document.getElementById('chart-bars');
  const labelsEl = document.getElementById('chart-labels');
  barsEl.innerHTML = ''; labelsEl.innerHTML = '';
  const showEvery = diffDays > 30 ? Math.ceil(diffDays / 15) : 1;

  keys.forEach((key, i) => {
    const b = buckets[key];
    const pct = (b.count / maxCount) * 100;
    const dayLabel = key.slice(5);
    const weekday = new Date(key + 'T12:00:00').toLocaleDateString('en', { weekday: 'short' });
    barsEl.innerHTML += `<div class="chart-bar" style="height:${Math.max(pct, 2)}%"><div class="tooltip">${weekday} ${dayLabel}: ${b.count} sessions, ${b.uniqueUsers.size} coaches</div></div>`;
    labelsEl.innerHTML += `<span>${i % showEvery === 0 ? dayLabel.slice(3) : ''}</span>`;
  });
}

// ─── Users Table (paginated) ────────────────────────────────────────────────
let _tableUsers = [];
let _tableShown = 0;
const PAGE_SIZE = 50;

function renderUsersTable(users) {
  _tableUsers = users;
  _tableShown = 0;
  document.getElementById('users-table').innerHTML = '';
  document.getElementById('users-table-title').textContent = `All Coaches (${users.length})`;
  showMoreUsers();
}

window.showMoreUsers = function() {
  const tbody = document.getElementById('users-table');
  const batch = _tableUsers.slice(_tableShown, _tableShown + PAGE_SIZE);
  tbody.innerHTML += batch.map(u => {
    const firstSeen = u.firstSeen ? new Date(u.firstSeen).toLocaleDateString('en', { month: 'short', day: 'numeric', year: 'numeric' }) : '\u2014';
    const lastSeen = u.lastSeen ? timeAgo(u.lastSeen) : '\u2014';
    const isReturning = u.sessionCount > 1;
    return `<tr>
      <td class="email">${u.email || '\u2014'}</td>
      <td>${u.displayName || '\u2014'}</td>
      <td>${firstSeen}</td>
      <td>${lastSeen}</td>
      <td>${u.sessionCount || 0}</td>
      <td><span class="${isReturning ? 'returning' : 'new'}">${isReturning ? 'Returning' : 'New'}</span></td>
    </tr>`;
  }).join('');
  _tableShown += batch.length;
  const btn = document.getElementById('users-show-more');
  btn.style.display = _tableShown < _tableUsers.length ? 'block' : 'none';
  btn.textContent = `Show more (${_tableUsers.length - _tableShown} remaining)`;
};

function timeAgo(ts) {
  const diff = Date.now() - ts;
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hours = Math.floor(mins / 60);
  if (hours < 24) return hours + 'h ago';
  const days = Math.floor(hours / 24);
  if (days < 7) return days + 'd ago';
  return new Date(ts).toLocaleDateString('en', { month: 'short', day: 'numeric' });
}
